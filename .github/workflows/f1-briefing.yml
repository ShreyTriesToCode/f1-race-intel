name: F1 Race Intel

on:
  schedule:
    - cron: "30 3 * * *"
    - cron: "0 */6 * * 4,5,6,0,1"
  workflow_dispatch:
    inputs:
      force_retrain:
        description: "Force retrain ML model"
        required: false
        default: "false"
      full_data_backfill_limit:
        description: "How many uncached full historical races to fetch this run"
        required: false
        default: "10"
      lookahead_days:
        description: "How many days ahead to search for F1 calendar events"
        required: false
        default: "90"
      send_email:
        description: "Allow email system when notification gate opens"
        required: false
        default: "true"
      force_notify:
        description: "Force email and GitHub Issue notification even outside notification window"
        required: false
        default: "false"
      notification_window_hours:
        description: "Hours before matched event when email and issue notifications are allowed"
        required: false
        default: "8"
      output_mode:
        description: "auto = scheduled logic. weekend = Sprint + Race weekend. today = today's Sprint/Race. next = next Sprint/Race."
        required: false
        default: "auto"

permissions:
  contents: write
  issues: write

concurrency:
  group: f1-race-intel-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          lfs: true

      - name: Sync with remote before generation
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Restore runtime caches
        uses: actions/cache@v4
        with:
          path: |
            fastf1_cache
            data_cache/http
            data_cache/full_races
            models/saved_models
          key: f1-runtime-cache-${{ runner.os }}-${{ hashFiles('f1_briefing.py', 'requirements.txt') }}
          restore-keys: |
            f1-runtime-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate briefing pipeline
        run: |
          python -m py_compile f1_briefing.py
          python -m unittest discover -s tests

      - name: Run F1 hybrid briefing
        env:
          F1_ICS_URL: ${{ secrets.F1_ICS_URL }}
          EMAIL_ENABLED: ${{ github.event.inputs.send_email || 'true' }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

          USER_TIMEZONE: "Asia/Kolkata"
          LOOKAHEAD_DAYS: ${{ github.event.inputs.lookahead_days || '90' }}
          FINAL_RESULTS_DELAY_HOURS: "8"
          NOTIFICATION_WINDOW_HOURS: ${{ github.event.inputs.notification_window_hours || '8' }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify || 'false' }}
          OUTPUT_MODE: ${{ github.event.inputs.output_mode || 'auto' }}

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

          FORCE_RETRAIN: ${{ github.event.inputs.force_retrain || 'false' }}
          ML_START_YEAR: "2018"
          USE_FULL_HISTORICAL_DATA: "true"
          FULL_DATA_BACKFILL_LIMIT: ${{ github.event.inputs.full_data_backfill_limit || '10' }}

          # Enabled intentionally. These sources can improve predictions when data is available.
          # If a source has not published data yet or blocks a request, f1_briefing.py should skip/fallback.
          UPGRADES_ENABLED: "true"
          F1_REGULATIONS_ENABLED: "true"
          OPENF1_ENABLED: "true"

          OFFICIAL_CALENDAR_ENABLED: "true"
          OFFICIAL_F1_CALENDAR_URL: "https://www.formula1.com/en/racing/{year}"

          F1_LIVE_TIMING_STATIC_BASE: "https://livetiming.formula1.com/static"
          OPENF1_BASE: "https://api.openf1.org/v1"
          OPENF1_REQUEST_SLEEP: "0.45"
          FIA_TECH_UPDATE_BASE: "https://www.fia.com/news"
          JOLPICA_REQUEST_SLEEP: "1.2"

          MODEL_DIR: "models/saved_models"
          HTTP_CACHE_DIR: "data_cache/http"
          FULL_RACE_CACHE_DIR: "data_cache/full_races"
          FASTF1_CACHE_DIR: "fastf1_cache"

          # If f1_briefing.py supports this flag, it prevents the script from pushing by itself.
          # The workflow commit step below is the source of truth.
          AUTO_COMMIT_ENABLED: "false"
        run: python f1_briefing.py

      - name: Commit generated outputs and caches
        if: success()
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Git state after generation:"
          git status --short

          # Stage outputs first. The previous workflow failed because it tried to rebase
          # while fastf1_cache/data_cache had unstaged changes.
          git add briefings MODEL_STATUS.md data_cache/latest-model-debug.json 2>/dev/null || true
          git add data_cache/http data_cache/full_races models/saved_models fastf1_cache 2>/dev/null || true

          if ! git diff --cached --quiet; then
            git commit -m "chore: update f1 race intel outputs"
          else
            echo "No generated file changes to commit before sync."
          fi

          # Now sync with remote only after the worktree is clean.
          git fetch origin main

          if [ "$(git rev-list --count HEAD..origin/main)" -gt 0 ]; then
            echo "Remote has new commits. Rebasing local generated commits."
            if ! git rebase origin/main; then
              echo "Rebase conflict occurred. Keeping this run's generated output for generated files."
              git status --short

              for file in briefings/latest-run-status.md briefings/index.json data_cache/latest-model-debug.json MODEL_STATUS.md; do
                if [ -e "$file" ]; then
                  git checkout --ours "$file" || true
                  git add "$file" || true
                fi
              done

              git add data_cache/http data_cache/full_races models/saved_models fastf1_cache 2>/dev/null || true

              if ! git diff --cached --quiet; then
                git commit --no-edit || true
              fi

              git rebase --continue || {
                echo "Automatic rebase recovery failed."
                git rebase --abort || true
                exit 1
              }
            fi
          else
            echo "Remote is not ahead. No rebase needed."
          fi

          if [ "$(git rev-list --count origin/main..HEAD)" -gt 0 ]; then
            git push origin HEAD:main
          else
            echo "No local commits to push."
          fi

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: f1-race-intel-output
          path: |
            briefings/**
            MODEL_STATUS.md
            data_cache/latest-model-debug.json
            data_cache/http/**
            data_cache/full_races/**
            fastf1_cache/**
            models/saved_models/**
          if-no-files-found: ignore
