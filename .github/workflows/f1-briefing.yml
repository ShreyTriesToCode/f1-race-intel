name: F1 Briefing, Full Data Backfill, ML Retrain, Issue, Email

on:
  schedule:
    - cron: "30 3 * * *"
    - cron: "0 */6 * * 4,5,6,0"
  workflow_dispatch:
    inputs:
      force_retrain:
        description: "Force retrain ML model"
        required: false
        default: "false"
      full_data_backfill_limit:
        description: "How many uncached full historical races to fetch this run"
        required: false
        default: "10"
      lookahead_days:
        description: "How many days ahead to search for F1 calendar events"
        required: false
        default: "90"
      send_email:
        description: "Allow email system when notification gate opens"
        required: false
        default: "true"
      force_notify:
        description: "Force email and GitHub Issue notification even outside 8-hour window"
        required: false
        default: "false"
      notification_window_hours:
        description: "Hours before matched event when email and issue notifications are allowed"
        required: false
        default: "8"
      output_mode:
        description: "Output mode. auto = manual weekend, scheduled today. weekend = Sprint + Race weekend. today = only today's Sprint/Race. next = next Sprint/Race."
        required: false
        default: "auto"

permissions:
  contents: write
  issues: write
  actions: read

concurrency:
  group: f1-race-intel
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Restore runtime caches
        uses: actions/cache@v4
        with:
          path: |
            fastf1_cache
            data_cache/http
          key: f1-runtime-cache-${{ runner.os }}-${{ hashFiles('f1_briefing.py') }}
          restore-keys: |
            f1-runtime-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run F1 hybrid briefing
        env:
          F1_ICS_URL: ${{ secrets.F1_ICS_URL }}
          EMAIL_ENABLED: ${{ github.event.inputs.send_email || 'true' }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          USER_TIMEZONE: "Asia/Kolkata"
          LOOKAHEAD_DAYS: ${{ github.event.inputs.lookahead_days || '90' }}
          FINAL_RESULTS_DELAY_HOURS: "8"
          NOTIFICATION_WINDOW_HOURS: ${{ github.event.inputs.notification_window_hours || '8' }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify || 'false' }}
          OUTPUT_MODE: ${{ github.event.inputs.output_mode || 'auto' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE_RETRAIN: ${{ github.event.inputs.force_retrain || 'false' }}
          ML_START_YEAR: "2018"
          USE_FULL_HISTORICAL_DATA: "true"
          OPENF1_ENABLED: "true"
          OPENF1_BASE: "https://api.openf1.org/v1"
          UPGRADES_ENABLED: "true"
          F1_REGULATIONS_ENABLED: "true"
          OFFICIAL_CALENDAR_ENABLED: "true"
          FIA_TECH_UPDATE_BASE: "https://www.fia.com/news"
          OFFICIAL_F1_CALENDAR_URL: "https://www.formula1.com/en/racing/{year}"
          FULL_DATA_BACKFILL_LIMIT: ${{ github.event.inputs.full_data_backfill_limit || '10' }}
          JOLPICA_REQUEST_SLEEP: "1.2"
          MODEL_DIR: "models/saved_models"
          HTTP_CACHE_DIR: "data_cache/http"
          FULL_RACE_CACHE_DIR: "data_cache/full_races"
          FASTF1_CACHE_DIR: "fastf1_cache"
        run: python f1_briefing.py

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: f1-race-intel-output
          path: |
            briefings/**
            data_cache/latest-model-debug.json
            data_cache/full_races/**
            models/saved_models/**
          if-no-files-found: ignore
